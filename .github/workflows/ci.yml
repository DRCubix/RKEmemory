name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (deterministic test deps only)
        run: |
          python -m pip install --upgrade pip
          # Install only what the deterministic tests need; avoid heavy ML deps.
          pip install pytest pyyaml python-dotenv

      - name: Run deterministic tests
        env:
          PYTHONPATH: src
        run: |
          pytest tests/test_config.py tests/test_wiki.py tests/test_chunking.py -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: pip }
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check src tests
