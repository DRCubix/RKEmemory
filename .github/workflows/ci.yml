name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (deterministic test deps only)
        run: |
          python -m pip install --upgrade pip
          # Light deps for offline tests — heavy ML/storage deps stay out.
          # whoosh + tantivy are needed for test_search_index / test_tantivy_index.
          pip install pytest pyyaml python-dotenv whoosh tantivy

      - name: Run deterministic tests
        env:
          PYTHONPATH: src
        run: |
          # Tests that can run without docker/network. Tests for features
          # that need live services (test_graph_temporal) auto-skip when the
          # backend is unreachable.
          pytest tests/test_config.py \
                 tests/test_wiki.py \
                 tests/test_chunking.py \
                 tests/test_search_index.py \
                 tests/test_tantivy_index.py \
                 tests/test_lifecycle.py \
                 tests/test_extractor.py \
                 tests/test_chat_memory.py \
                 tests/test_graph_temporal.py \
                 -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check src tests
